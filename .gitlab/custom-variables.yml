# This file defines project-specific VARIABLES ONLY.
# It is included in the PARENT pipeline (.gitlab-ci.yml) to provide
# variables that are passed as component inputs and forwarded to child pipelines.

###############################################################################
# MACHINE-SPECIFIC ALLOCATION VARIABLES
###############################################################################

variables:
  # Allocation name (used for shared allocations)
  ALLOC_NAME: ${CI_PROJECT_NAME}_ci_${CI_PIPELINE_ID}

  # Dane (SLURM) allocation settings
  DANE_SHARED_ALLOC: "--exclusive --reservation=ci --time=55 --nodes=1"
  # Note: we repeat the reservation, helpful when jobs are manually re-triggered.
  DANE_JOB_ALLOC: "--reservation=ci --nodes=1"
  # Arguments for performance job allocation (dedicated allocation with no overlapping).
  DANE_PERF_ALLOC: "--exclusive --reservation=ci --time=17 --nodes=1"
  # Project specific variants for dane
  PROJECT_DANE_VARIANTS: "~shared +openmp"
  # Project specific deps for dane
  PROJECT_DANE_DEPS: ""

  # Matrix (SLURM) allocation settings
  MATRIX_SHARED_ALLOC: "--exclusive --partition=pci --account=wbronze --time=45 --nodes=1"
  # Note: we repeat the reservation, helpful when jobs are manually re-triggered.
  MATRIX_JOB_ALLOC: "--partition=pci --account=wbronze --nodes=1"
  # Project specific variants for matrix
  PROJECT_MATRIX_VARIANTS: "~shared +openmp +cuda cuda_arch=90"
  # Project specific deps for matrix
  PROJECT_MATRIX_DEPS: ""

  # Corona (flux) allocation settings
  CORONA_SHARED_ALLOC: "--exclusive --time-limit=25m --nodes=1 -o per-resource.count=2"
  CORONA_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
  # Project specific variants for corona
  PROJECT_CORONA_VARIANTS: "~shared ~openmp"
  # Project specific deps for corona
  PROJECT_CORONA_DEPS: ""

  # Tioga (flux) allocation settings
  TIOGA_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=31m --nodes=1 -o per-resource.count=2"
  TIOGA_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
  # Project specific variants for tioga
  PROJECT_TIOGA_VARIANTS: "~shared +openmp"
  # Project specific deps for tioga
  PROJECT_TIOGA_DEPS: ""

  # Tuolumne (flux) allocation settings
  TUOLUMNE_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=31m --nodes=1 -o per-resource.count=2"
  TUOLUMNE_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
  # Arguments for performance job allocation (dedicated allocation with no overlapping).
  TUOLUMNE_PERF_ALLOC: "--queue=pci --exclusive --time-limit=15m --nodes=1 --begin-time=+5s"
  # Project specific variants for tuolumne
  PROJECT_TUOLUMNE_VARIANTS: "~shared +openmp"
  # Project specific deps for tuolumne
  PROJECT_TUOLUMNE_DEPS: ""
